{# Design system — included in <head> by every page.
   Speakeasy: near-black warm bg, scarce gold (hero + confident only),
   cool sage for meta (when/where), Fraunces serif for display type.
   One easing curve everywhere; tiers shown by light, not badges. #}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c09; --card: #16120e; --card2: #1c1712;
    --text: #ede6da; --muted: #9a8d7d; --faint: #6e6355;
    --line: #292219; --line2: #362c1f;
    --gold: #e8b34b; --gold-dim: #8a6a2a; --gold-glow: rgba(232, 179, 75, 0.10);
    --cool: #8fa39b;                    /* meta: times, places, counts */
    --green: #7fb069; --red: #c96f5e;
    --serif: "Fraunces", Georgia, serif;
    --ease: cubic-bezier(0.2, 0.9, 0.3, 1.15);
    interpolate-size: allow-keywords;   /* smooth <details> height where supported */
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.5 -apple-system, "Segoe UI", sans-serif; }
  /* type scale: 12 / 13.5 / 15.5 / 26 — nothing else */
  .num, .arc, .meter { font-variant-numeric: tabular-nums; }

  header { display: flex; align-items: baseline; gap: 18px; margin-bottom: 10px; }
  h1.wordmark { font-family: var(--serif); font-style: italic; font-weight: 600;
                font-size: 25px; margin: 0; letter-spacing: 0; }
  h1.wordmark .tip { color: var(--gold); }
  nav a { color: var(--muted); text-decoration: none; margin-right: 10px;
          padding: 3px 11px; border-radius: 99px; border: 1px solid var(--line);
          font-size: 13.5px; transition: color .15s, border-color .15s; }
  nav a:hover { color: var(--text); border-color: var(--line2); }
  nav a.active { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: 600; }
  .btn { font-size: 13.5px; padding: 6px 13px; border-radius: 9px; cursor: pointer;
         border: 1px solid var(--line); background: var(--card2); color: var(--text);
         text-decoration: none;
         transition: background .3s, color .3s, border-color .2s, transform .18s var(--ease); }
  .btn:hover { border-color: var(--gold-dim); }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 650; }
  .btn.done { background: var(--green); border-color: var(--green); color: var(--bg); }

  .tag { font-size: 12px; padding: 1px 9px; border-radius: 99px;
         border: 1px solid var(--line); background: var(--card2); color: var(--muted);
         cursor: pointer;
         transition: color .15s, border-color .15s, transform .15s var(--ease); }
  .tag:hover { border-color: var(--gold-dim); color: var(--text); }
  .tag:active { transform: scale(0.88); }
  .tag.on { border-color: var(--gold); color: var(--gold); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* match arc — the score is a mark, the number lives in the tooltip/expander */
  .arc { --p: 0; width: 28px; height: 28px; flex: none; border-radius: 50%;
         background: conic-gradient(var(--gold) calc(var(--p) * 1%), var(--line2) 0);
         -webkit-mask: radial-gradient(farthest-side, #0000 62%, #000 63%);
         mask: radial-gradient(farthest-side, #0000 62%, #000 63%); }
  .arc.lg { width: 40px; height: 40px; }
  .arc.dim { background: conic-gradient(var(--faint) calc(var(--p) * 1%), var(--line) 0); }

  /* booze meter — five coupe segments */
  .meter { display: inline-flex; gap: 2px; align-items: center; }
  .meter i { width: 9px; height: 9px; border-radius: 2px; background: var(--line2); }
  .meter i.on { background: var(--gold); }

  /* cards: tier is light, not a label */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
          padding: 14px 16px; margin-bottom: 10px;
          transition: opacity .2s, border-color .2s, box-shadow .3s; }
  .card.confident { border-color: var(--gold-dim);
                    box-shadow: 0 0 30px -8px var(--gold-glow),
                                inset 0 0 0 1px rgba(232, 179, 75, 0.05); }
  .card.maybe { opacity: 0.68; }
  .card.maybe:hover { opacity: 1; }
  .row1 { display: flex; align-items: center; gap: 12px; }
  .title { font-weight: 650; font-size: 15.5px; flex: 1; min-width: 0; }
  .title a { color: var(--text); text-decoration: none; transition: color .15s; }
  .title a:hover { color: var(--gold); }
  .meta { color: var(--cool); font-size: 13.5px; margin-top: 3px; }
  .meta .rsvp { color: var(--gold); }
  .rep.good { color: var(--green); }
  .rep.bad { color: var(--red); }
  .price.free { color: var(--green); }
  .whyline { margin-top: 9px; font-size: 13.5px; color: var(--muted);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .why { margin: 8px 0 0; padding: 9px 11px; background: var(--card2);
         border-radius: 8px; font-size: 13.5px; color: var(--muted); }
  .why b { color: var(--text); font-weight: 600; }
  details.why-more > summary { cursor: pointer; font-size: 12px; color: var(--faint);
                               margin-top: 6px; transition: color .15s; }
  details.why-more > summary:hover { color: var(--gold); }
  ::details-content { transition: height .25s var(--ease), content-visibility .25s allow-discrete;
                      height: 0; overflow: clip; }
  [open]::details-content { height: auto; }
  .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* feedback log — quiet row under each card; feeds the host-reputation scorer */
  .btn.sm { font-size: 12px; padding: 3px 10px; border-radius: 7px; }
  .fbrow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
           margin-top: 11px; padding-top: 10px; border-top: 1px solid var(--line); }
  .fbq { color: var(--faint); font-size: 12px; }
  .fbq + .fbq, .btn.sm + .fbq { margin-left: 8px; }
  .btn.sm.done.miss { background: var(--red); border-color: var(--red); color: var(--bg); }

  /* pulsing "now" dot */
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 99px;
           background: var(--gold); margin: 0 9px 2px 0; vertical-align: middle;
           animation: pulse 2.4s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(232, 179, 75, 0.45); }
    70% { box-shadow: 0 0 0 8px rgba(232, 179, 75, 0); }
    100% { box-shadow: 0 0 0 0 rgba(232, 179, 75, 0); }
  }

  /* designed empty state: a coupe glass */
  .empty { color: var(--muted); padding: 56px 0; text-align: center; font-size: 13.5px; }
  .coupe { width: 46px; height: 24px; margin: 0 auto 24px; position: relative;
           border: 2px solid var(--gold-dim); border-top: none;
           border-radius: 0 0 46px 46px; opacity: 0.8; }
  .coupe::after { content: ""; position: absolute; left: 50%; bottom: -18px;
                  width: 2px; height: 16px; background: var(--gold-dim);
                  transform: translateX(-50%); }
  .coupe::before { content: ""; position: absolute; left: 50%; bottom: -20px;
                   width: 22px; height: 2px; background: var(--gold-dim);
                   transform: translateX(-50%); }
  /* warming-up variant: the glass fills and empties while the first scrape runs */
  .coupe.pouring { overflow: hidden; }
  .coupe.pouring > i { position: absolute; left: 0; right: 0; bottom: 0;
                       background: var(--gold); opacity: 0.5;
                       animation: fill 2.2s ease-in-out infinite; }
  @keyframes fill { 0%, 100% { height: 15%; } 50% { height: 85%; } }
  .empty small { display: inline-block; margin-top: 8px; opacity: 0.7; }
</style>
