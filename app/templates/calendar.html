<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% if warming_up %}<meta http-equiv="refresh" content="12">{% endif %}
<title>sloshbot — calendar</title>
{% include "_theme.html" %}
<style>
  :root { --hour-h: 56px; /* one hour of grid height */ }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }

  .cal { display: grid; grid-template-columns: 52px repeat(7, 1fr);
         border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
         background: var(--card); }
  .cal-head { position: sticky; top: 0; z-index: 3; background: var(--card2);
              border-bottom: 1px solid var(--line); padding: 8px 4px;
              text-align: center; font-size: 12px; color: var(--muted);
              text-transform: uppercase; letter-spacing: 0.08em; }
  .cal-head .num { display: block; font-size: 18px; color: var(--text);
                   font-weight: 650; letter-spacing: 0; text-transform: none; }
  .cal-head.today .num { color: var(--gold); }
  .cal-head .more { display: block; font-size: 9.5px; color: var(--faint);
                     text-transform: none; letter-spacing: 0; margin-top: 1px; }
  .cal-cap { color: var(--faint); font-size: 12px; margin: 0 0 14px; }
  .gutter { border-right: 1px solid var(--line); }
  .gutter .hour { height: var(--hour-h); font-size: 10.5px; color: var(--muted);
                  text-align: right; padding-right: 6px; transform: translateY(-7px); }
  .col { position: relative; border-right: 1px solid var(--line);
         height: calc(var(--hour-h) * 16);
         background: repeating-linear-gradient(to bottom,
           transparent 0, transparent calc(var(--hour-h) - 1px),
           var(--line) calc(var(--hour-h) - 1px), var(--line) var(--hour-h)); }
  .col:last-child { border-right: none; }
  .col.today { background-color: rgba(232, 179, 75, 0.04); }

  .evt { position: absolute; z-index: 1; overflow: hidden; padding: 3px 6px;
         border-radius: 6px; border: 1px solid var(--line); border-left: 3px solid var(--muted);
         background: var(--card2); font-size: 11px; line-height: 1.3;
         color: var(--text); text-decoration: none; display: block; }
  .evt:hover { z-index: 2; border-color: var(--gold-dim); }
  .evt.confident { border-left-color: var(--gold); background: #2a2213; }
  .evt .t { font-weight: 650; display: block; }
  .evt .when { color: var(--muted); }
  .evt .tags { margin-top: 2px; display: flex; gap: 3px; flex-wrap: wrap; }
  .evt .tag { font-size: 9.5px; padding: 0 5px; border-radius: 99px;
              border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }

  .now-line { position: absolute; left: 0; right: 0; z-index: 2; height: 0;
              border-top: 2px solid var(--red); pointer-events: none; }
  .now-line::before { content: ""; position: absolute; left: -4px; top: -5px;
                      width: 8px; height: 8px; border-radius: 99px; background: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="wordmark">slosh<span class="tip">bot</span></h1>
    <nav>
      <a href="/">Tonight</a>
      <a href="/week">This week</a>
      <a href="/calendar" class="active">Calendar</a>
      <a href="/map">Map</a>
    </nav>
    <form class="logout-form" method="post" action="/logout">
      <button class="btn" type="submit">log out</button>
    </form>
  </header>

  {% include "_filterbar.html" %}

  <div id="page-main">{% include "_main_calendar.html" %}</div>
</div>
</body>
</html>
