  :root {
    --bg: #0e0c09; --card: #16120e; --card2: #1c1712;
    --text: #ede6da; --muted: #9a8d7d; --faint: #6e6355;
    --line: #292219; --line2: #362c1f;
    --gold: #e8b34b; --gold-dim: #8a6a2a; --gold-glow: rgba(232, 179, 75, 0.10);
    --cool: #8fa39b; --green: #7fb069; --red: #c96f5e;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Hanken Grotesk", -apple-system, "Segoe UI", Helvetica, sans-serif;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --ease: cubic-bezier(0.2, 0.9, 0.3, 1.15);
    /* meta = a temperature choice. Default keeps the current cool sage so the
       "Current" palette is a true baseline; every new palette warms it. */
    --meta: var(--cool);
    /* tactile surfaces derive from the card tokens so palettes re-theme for free */
    --surf-hi: var(--card2); --surf-lo: var(--card);
    --sheen: rgba(237, 230, 218, 0.05);      /* warm top-light on a coaster */
    --sheen-c: rgba(232, 179, 75, 0.14);     /* gold spill on the lit pick */
    --gold-press: var(--gold-press);                   /* the pressed edge of a gold button */
  }

  /* === candlelight — monochrome warm; one temperature, no cool at all === */
  .lab[data-pal="candle"] {
    --bg: #100b06; --card: #17110a; --card2: #20180f;
    --text: #f0e5d3; --muted: #a58e73; --faint: #6f5c44;

  function meanLatRad() {
    const lats = PINS.map(p => p.lat).concat([HOME.lat]);
    const mean = lats.reduce((a, b) => a + b, 0) / lats.length;
    return mean * Math.PI / 180;
  }
  const COS_LAT = Math.cos(meanLatRad());

  function toMeters(lat, lon) {
    return {
      x: (lon - HOME.lon) * DEG_M * COS_LAT,
      y: (HOME.lat - lat) * DEG_M, // north is up: higher lat -> smaller screen y
    };
  }

  function boozeRead(n) {
    if (n >= 90) return "basically an open bar";
    if (n >= 75) return "probably";
    if (n >= 60) return "good odds";
    if (n >= 40) return "coin flip";
    if (n >= 20) return "bring your own";
    return "bone dry";
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  const CONFIDENT_THRESH = 65; // matches the weekly view's default pour line

  function pinSize(booze) {
    if (booze >= CONFIDENT_THRESH) {
      return { r: 8 + (booze - CONFIDENT_THRESH) / 35 * 5, confident: true,
                opacity: 0.75 + (booze - CONFIDENT_THRESH) / 35 * 0.2 };
    }
    return { r: 4 + booze / CONFIDENT_THRESH * 3.5, confident: false,
              opacity: 0.35 + booze / CONFIDENT_THRESH * 0.35 };
  }

  const stage = document.getElementById("stage");
  let W = 0, H = 0;
  const PAD = 56;
  let scale = 1, originPx = { x: 0, y: 0 };

  // fit bounds: every pin's meters position, home (0,0), and a synthetic
  // extent guaranteeing the 1/2/3mi rings are always comfortably framed
  function computeFit() {
    W = stage.clientWidth; H = stage.clientHeight;
    const pts = PINS.map(p => toMeters(p.lat, p.lon));
    pts.push({ x: 0, y: 0 });
    const ringExtent = 3.35 * MI_M;
    pts.push({ x: ringExtent, y: 0 }, { x: -ringExtent, y: 0 },
              { x: 0, y: ringExtent }, { x: 0, y: -ringExtent });
    const minX = Math.min(...pts.map(p => p.x)), maxX = Math.max(...pts.map(p => p.x));
    const minY = Math.min(...pts.map(p => p.y)), maxY = Math.max(...pts.map(p => p.y));
    const availW = Math.max(1, W - 2 * PAD), availH = Math.max(1, H - 2 * PAD);
    const spanX = Math.max(1, maxX - minX), spanY = Math.max(1, maxY - minY);
    scale = Math.min(availW / spanX, availH / spanY);
    const usedW = spanX * scale, usedH = spanY * scale;
    originPx = {
      minX, minY,
      offX: PAD + (availW - usedW) / 2,
      offY: PAD + (availH - usedH) / 2,
    };
  }

  function project(lat, lon) {
    const m = toMeters(lat, lon);
    return {
      x: originPx.offX + (m.x - originPx.minX) * scale,
      y: originPx.offY + (m.y - originPx.minY) * scale,
    };
  }

  // ---------------------------------------------------------------
  // COLLISION HANDLING: SF events cluster downtown, so pins land on
  // top of each other. After projecting, group pins whose screen
  // positions fall within 8px of one another (connected components,
  // not just pairwise) and arrange each group on a small ring around
  // its centroid, spaced evenly by angle. The starting angle is
  // derived deterministically from the group's first event id (a
  // cheap string hash) so re-renders never reshuffle the fan — no
  // randomness, same layout every load.
  // ---------------------------------------------------------------
  function hashAngle(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return (h % 360) * Math.PI / 180;
  }

  function resolveCollisions(positioned) {
    const CLUSTER_PX = 8;
    const n = positioned.length;
    const parent = positioned.map((_, i) => i);
    function find(i) { return parent[i] === i ? i : (parent[i] = find(parent[i])); }
    function union(a, b) { a = find(a); b = find(b); if (a !== b) parent[a] = b; }
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = positioned[i].sx - positioned[j].sx, dy = positioned[i].sy - positioned[j].sy;
        if (Math.hypot(dx, dy) < CLUSTER_PX) union(i, j);
      }
    }
    const groups = new Map();
    positioned.forEach((p, i) => {
      const root = find(i);
      if (!groups.has(root)) groups.set(root, []);
      groups.get(root).push(p);
    });
    groups.forEach(group => {
      if (group.length === 1) return;
      const cx = group.reduce((s, p) => s + p.sx, 0) / group.length;
      const cy = group.reduce((s, p) => s + p.sy, 0) / group.length;
      const fanR = 7 + Math.min(group.length, 8) * 2.2;
      const base = hashAngle(group[0].pin.id);
      group.sort((a, b) => a.pin.id < b.pin.id ? -1 : 1);
      group.forEach((p, idx) => {
        const ang = base + (idx / group.length) * Math.PI * 2;
        p.sx = cx + Math.cos(ang) * fanR;
        p.sy = cy + Math.sin(ang) * fanR;
      });
    });
  }

  // ---------------------------------------------------------------
  // BUILD: rings, home marker, neighborhood labels, pins (fixed
  // layout computed once; filters only toggle visibility so pins
  // never jump around when the distance cap or "tonight" changes).
  // ---------------------------------------------------------------
  let pinEls = [];
  let ringEls = {};

  function build() {
    stage.innerHTML = "";
    computeFit();

    // rings at 1/2/3mi
    ringEls = {};
    [1, 2, 3].forEach(mi => {
      const rPx = mi * MI_M * scale;
      const home = project(HOME.lat, HOME.lon);
      const ring = document.createElement("div");
      ring.className = "ring";
      ring.style.left = home.x + "px";
      ring.style.top = home.y + "px";
      ring.style.width = ring.style.height = (rPx * 2) + "px";
      stage.appendChild(ring);
      ringEls[mi] = ring;

      const label = document.createElement("div");
      label.className = "ring-label";
      label.textContent = mi + " mi";
      label.style.left = home.x + "px";
      label.style.top = (home.y - rPx) + "px";
      stage.appendChild(label);
    });

    // home marker
    const homePx = project(HOME.lat, HOME.lon);
    const homeDot = document.createElement("div");
    homeDot.className = "home-pin";
    homeDot.style.left = homePx.x + "px";
    homeDot.style.top = homePx.y + "px";
    stage.appendChild(homeDot);
    const homeLbl = document.createElement("div");
    homeLbl.className = "home-label";
    homeLbl.textContent = "home";
    homeLbl.style.left = homePx.x + "px";
    homeLbl.style.top = homePx.y + "px";
    stage.appendChild(homeLbl);

    // neighborhood labels at centroid of that neighborhood's events
    const byNeigh = new Map();
    PINS.forEach(p => {
      if (!p.neighborhood) return;
      if (!byNeigh.has(p.neighborhood)) byNeigh.set(p.neighborhood, []);
      byNeigh.get(p.neighborhood).push(p);
    });
    byNeigh.forEach((group, name) => {
      const cx = group.reduce((s, p) => s + p.lon, 0) / group.length;
      const cy = group.reduce((s, p) => s + p.lat, 0) / group.length;
      const px = project(cy, cx);
      const lbl = document.createElement("div");
      lbl.className = "neigh-label";
      lbl.textContent = name;
      lbl.style.left = px.x + "px";
      lbl.style.top = px.y + "px";
      stage.appendChild(lbl);
    });

    // project pins, then resolve collisions in screen space
    const positioned = PINS.map(p => {
      const px = project(p.lat, p.lon);
      return { pin: p, sx: px.x, sy: px.y };
    });
    resolveCollisions(positioned);

    const tip = document.createElement("div");
    tip.className = "pin-tip";
    stage.appendChild(tip);

    pinEls = positioned.map(({ pin, sx, sy }) => {
      const size = pinSize(pin.booze);
      const el = document.createElement("div");
      el.className = "pin" + (size.confident ? " confident" : "");
      el.tabIndex = 0;
      el.style.left = sx + "px";
      el.style.top = sy + "px";
      el.style.width = el.style.height = (size.r * 2) + "px";
      el.style.opacity = size.opacity;
      if (size.confident) {
        el.style.boxShadow = `0 0 ${6 + size.r}px -1px var(--gold-glow)`;
      }
      el.dataset.mi = pin.distance_mi;
      el.dataset.day = pin.starts_at.slice(0, 10);
      el.addEventListener("mouseenter", () => showTip(el, pin));
      el.addEventListener("mouseleave", () => hideTip());
      el.addEventListener("focus", () => showTip(el, pin));
      el.addEventListener("blur", () => hideTip());
      el.addEventListener("click", (ev) => { ev.stopPropagation(); openPopover(el, pin); });
      stage.appendChild(el);
      return el;
    });

    function showTip(el, pin) {
      tip.innerHTML = `${escapeHtml(pin.title)}<span class="read">${boozeRead(pin.booze)}</span>`;
      tip.style.left = el.style.left;
      tip.style.top = el.style.top;
      tip.classList.add("show");
    }
    function hideTip() { tip.classList.remove("show"); }

    applyFilters();
  }

  // ---------------------------------------------------------------
  // POPOVER: coaster material, one open at a time, kept inside the
  // viewport (flips left/up if it would overflow near an edge).
  // ---------------------------------------------------------------
  let popEl = null;
  function closePopover() {
    if (popEl) { popEl.classList.remove("open"); setTimeout(() => popEl && popEl.remove(), 160); popEl = null; }
  }

  function openPopover(pinEl, pin) {
    closePopover();
    const read = boozeRead(pin.booze);
    const tags = (pin.tags || []).map(t => `<span>${escapeHtml(t)}</span>`).join("");
    const pop = document.createElement("div");
    pop.className = "mp-pop";
    pop.innerHTML = `
      <button type="button" class="mp-close" aria-label="close">&times;</button>
      <div class="ta-top">
        <span class="ta-title">${escapeHtml(pin.title)}</span>
        <span class="coupe ${pin.booze >= CONFIDENT_THRESH ? "" : "dim"}" style="--p:${pin.booze}" title="${read} (${pin.booze}%)">
          <span class="glass"><span class="liq"></span></span><span class="stem"></span><span class="foot"></span>
        </span>
      </div>
      <div class="ta-meta"><span class="ta-read">${read}</span> &middot; ${fmtTime(pin.starts_at)}${pin.venue ? " &middot; " + escapeHtml(pin.venue) : ""}${pin.distance_mi !== null ? " &middot; " + pin.distance_mi.toFixed(1) + " mi" : ""}</div>
      <p class="ta-why">${escapeHtml(pin.blurb || "")}</p>
      <div class="ta-foot"><div class="ta-tags">${tags}</div><button class="ta-hold">+ hold</button></div>
    `;
    stage.appendChild(pop);
    pop.querySelector(".mp-close").addEventListener("click", (ev) => { ev.stopPropagation(); closePopover(); });
    pop.addEventListener("click", (ev) => ev.stopPropagation());

    // position: anchor above-right of the pin, flip if it would clip
    const px = parseFloat(pinEl.style.left), py = parseFloat(pinEl.style.top);
    const popW = 280, popH = pop.offsetHeight || 220;
    let left = px + 14, top = py - popH - 14;
    if (left + popW > W - 8) left = px - popW - 14;
    if (left < 8) left = 8;
    if (top < 8) top = py + 14; // flip below if it would clip the top
    if (top + popH > H - 8) top = Math.max(8, H - popH - 8);
    pop.style.left = left + "px";
    pop.style.top = top + "px";
    requestAnimationFrame(() => pop.classList.add("open"));
    popEl = pop;
  }

  document.addEventListener("click", () => closePopover());
  document.addEventListener("keydown", (ev) => { if (ev.key === "Escape") closePopover(); });

  // ---------------------------------------------------------------
  // FILTERS: distance cap hides pins + highlights the matching ring;
  // "tonight" narrows to today's date. Both are AND'd. Layout never
  // recomputes on filter change — only visibility toggles.
  // ---------------------------------------------------------------
  function applyFilters() {
    pinEls.forEach(el => {
      const mi = parseFloat(el.dataset.mi);
      const day = el.dataset.day;
      let show = true;
      if (state.maxMi !== null && !isNaN(mi) && mi > state.maxMi) show = false;
      if (state.tonightOnly && day !== TODAY) show = false;
      el.classList.toggle("hidden", !show);
    });
    [1, 2, 3].forEach(mi => {
      ringEls[mi].classList.toggle("active", state.maxMi === mi);
      ringEls[mi].classList.toggle("capped", state.maxMi !== null && mi > state.maxMi);
    });
  }

  const distSeg = document.getElementById("distSeg");
  distSeg.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      distSeg.querySelectorAll("button").forEach(b => b.removeAttribute("aria-current"));
      btn.setAttribute("aria-current", "true");
      const mi = btn.dataset.mi;
      state.maxMi = mi === "" ? null : parseFloat(mi);
      applyFilters();
    });
  });

  const tonightToggle = document.getElementById("tonightToggle");
  tonightToggle.addEventListener("click", () => {
    state.tonightOnly = !state.tonightOnly;
    tonightToggle.setAttribute("aria-pressed", String(state.tonightOnly));
    applyFilters();
  });

  // ---------------------------------------------------------------
  // UNPLACED: events with no coordinates never drop silently.
  // ---------------------------------------------------------------
  const unplacedBar = document.getElementById("unplacedBar");
  if (UNPLACED.length) {
    unplacedBar.innerHTML = `<summary>${UNPLACED.length} more, address unknown</summary>
      <div class="unplaced-list">${UNPLACED.map(u =>
        `<span>${escapeHtml(u.title)}<span class="un-b"> &middot; ${u.booze}%</span></span>`
      ).join("")}</div>`;
  } else {
    unplacedBar.style.display = "none";
  }

  // ---------------------------------------------------------------
  window.addEventListener("resize", build);
  build();
})();
</script>
