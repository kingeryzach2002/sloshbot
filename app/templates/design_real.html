  :root {
    --bg: #0e0c09; --card: #16120e; --card2: #1c1712;
    --text: #ede6da; --muted: #9a8d7d; --faint: #6e6355;
    --line: #292219; --line2: #362c1f;
    --gold: #e8b34b; --gold-dim: #8a6a2a; --gold-glow: rgba(232, 179, 75, 0.10);
    --cool: #8fa39b; --green: #7fb069; --red: #c96f5e;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Hanken Grotesk", -apple-system, "Segoe UI", Helvetica, sans-serif;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --ease: cubic-bezier(0.2, 0.9, 0.3, 1.15);
    /* meta = a temperature choice. Default keeps the current cool sage so the
       "Current" palette is a true baseline; every new palette warms it. */
    --meta: var(--cool);
    /* tactile surfaces derive from the card tokens so palettes re-theme for free */
    --surf-hi: var(--card2); --surf-lo: var(--card);
    --sheen: rgba(237, 230, 218, 0.05);      /* warm top-light on a coaster */
    --sheen-c: rgba(232, 179, 75, 0.14);     /* gold spill on the lit pick */
    --gold-press: var(--gold-press);                   /* the pressed edge of a gold button */
  }

  /* === candlelight — monochrome warm; one temperature, no cool at all === */
  .lab[data-pal="candle"] {
    --bg: #100b06; --card: #17110a; --card2: #20180f;
    --text: #f0e5d3; --muted: #a58e73; --faint: #6f5c44;

is a free fitness/self-defense class held at a sporting goods store (Sports Basement), with no mention of alcohol, food, social gathering, or any drink-related language\u2014evening fitness classes are a low base rate category for free alcohol, and the educational/instructional framing makes complimentary drinks extremely unlikely.","tags":[],"blurb":"Submitted by the Event OrganizerIntro to Personal Safety & Self-Defense Class | Berkeley Impact Bay Area This one hour class provides an\u2026"},{"id":"funcheap:motown-on-mondays-dj-night-madrone-art-bar-270","source":"funcheap","title":"\u201cMotown On Mondays\u201d DJ Night (Madrone Art Bar)","venue_name":"Madrone Art Bar","neighborhood":null,"host_name":"madroneartbar.com","starts_at":"2026-07-13T19:00:00-07:00","ends_at":"2026-07-13T21:00:00-07:00","is_free":true,"rsvp_type":null,"distance_mi":0.49,"booze":18,"rationale":"This is a ticketed DJ night at a bar venue (cover charge after 8pm, 21+ club atmosphere) with no explicit mention of free or hosted drinks; the rules establish that bars default to cash bar, cover charges signal pay-your-own-drinks, and nightlife venues are almost always patron-funded, not sponsor-provided.","tags":["music"],"blurb":"Submitted by the Event Organizer\u201cMotown On Mondays\u201d DJ Night (Madrone Art Bar) Motown on Mondays Every Monday at Madrone, dance the night\u2026"},{"id":"dothebay:17208134","source":"dothebay","title":"The Chi Lites Feat. Marshall Thompson","venue_name":"Yoshi's Oakland","neighborhood":null,"host_name":null,"starts_at":"2026-07-13T19:00:00-07:00","ends_at":"2026-07-13T21:00:00-07:00","is_free":false,"rsvp_type":null,"distance_mi":9.27,"booze":15,"rationale":"This is a ticketed concert ($49\u2013$99) at a music venue (Yoshi's Oakland, a jazz/music club); the listing contains zero mention of complimentary drinks, hosted bar, or open bar\u2014venues of this type operate on a cash-bar model where attendees purchase their own beverages, and the cover charge itself rt ($30\u2013$40 cover charge) at a venue (Great American Music Hall) with no mention of free drinks, hosted bar, or reception\u2014default to cash bar; cover charge is a negative signal for complimentary alcohol.","tags":[],"blurb":"Ticketed music concert ($30\u2013$40 cover charge) at a venue (Great American Music Hall) with no mention of free drinks, hosted bar, or receptio"},{"id":"dothebay:17248369","source":"dothebay","title":"Streetlight Manifesto","venue_name":"The Regency Ballroom","neighborhood":null,"host_name":"Goldenvoice Presents","starts_at":"2026-07-13T20:00:00-07:00","ends_at":"2026-07-13T22:00:00-07:00","is_free":false,"rsvp_type":null,"distance_mi":1.76,"booze":8,"rationale":"This is a ticketed concert at a major venue (The Regency Ballroom) promoted by Goldenvoice, a professional promoter; no mention of free drinks, open bar, or alcohol provision anywhere in the listing, and concert venues operate on a cash-bar model by default.","tags":[],"blurb":"Goldenvoice Presents Streetlight Manifesto Monday, July 13 | The Regency Ballroom Seven guys, seven different musical backgrounds, seven\u2026"},{"id":"dothebay:17188960","source":"dothebay","title":"Mirthquake: Monday Live Comedy in the Richmond","venue_name":"The Abbey Tavern","neighborhood":null,"host_name":"Abbey Tavern","starts_at":"2026-07-13T20:00:00-07:00","ends_at":"2026-07-13T22:00:00-07:00","is_free":true,"rsvp_type":null,"distance_mi":1.24,"booze":22,"rationale":"This is a free comedy show at a bar (Abbey Tavern), but the listing contains no explicit mention of free/hosted drinks, and per calibration rules, bars default to cash bar unless drinks are explicitly promised; the free ticket applies to entry, not beverages.","tags":["comedy"],"blurb":"This is a free comedy show at a bar (Abbey Tavern), but the listing contains no explicit mention of free/hosted drinks, and per calibration "},{"id":"dothebay:15023723","source":"dothebay","title":"Haight Laughsbury Comedy Show","venue_name":"O'Reilly's Pub","neighborhood":null,"host_name":"Best Medicine Presents","starts_at":"2026-07-13T20:15:00-07:00","ends_at":"2026-07-13T22:15:00-07:00","is_free":true,"rsvp_type":null,"distance_mi":0.41,"booze":22,"rationale":"Free-admission comedy show at a pub (O'Reilly's Irish Pub) with no explicit mention of free/hosted drinks, no sponsor logos, and no drink language\u2014venue-with-bar defaults to cash bar unless stated otherwise, and the free ticket covers entry only, not beverages.","tags":["comedy"],"blurb":"Best Medicine Presents Haight Laughsbury Comedy Show Most Mondays | O'Reilly's Pub Come see a Free Show to help you forget it's Monday!"}]</script>
<script>
(function () {
  // home: settings.home_lat/home_lon (lat 37.770518, lon -122.4451024)
  const EVENTS = JSON.parse(document.getElementById("events-data").textContent);

  const state = { thresh: 65, maxMi: null, freeOnly: false, tags: new Set(), sources: new Set() };
  const lazyRest = new Map();   // dayKey -> below-threshold events, built on first disclosure open

  // ---- helpers ----
  function cleanVenue(name) {
    if (!name) return "";
    // scraped venue_name sometimes carries a full street address after a comma
    const idx = name.indexOf(",");
    return (idx === -1 ? name : name.slice(0, idx)).trim();
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  }

  function dayKey(iso) { return iso.slice(0, 10); }

  function fmtDow(iso) {
    return new Date(iso).toLocaleDateString("en-US", { weekday: "long", timeZone: "America/Los_Angeles" });
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    const mon = d.toLocaleDateString("en-US", { month: "short", timeZone: "America/Los_Angeles" }).toUpperCase();
    const day = d.toLocaleDateString("en-US", { day: "numeric", timeZone: "America/Los_Angeles" });
    return mon + " " + day;
  }

  // wry-bartender read of the booze score — six bands, no gaps, 0..100
  function boozeRead(n) {
    if (n >= 90) return "basically an open bar";
    if (n >= 75) return "probably";
    if (n >= 60) return "good odds";
    if (n >= 40) return "coin flip";
    if (n >= 20) return "bring your own";
    return "bone dry";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- chip popovers (tags + source share one pattern) ----
  const popovers = [];

  function makeChipPopover(btnId, panelId, labelBase, counts, stateSet) {
    const btn = document.getElementById(btnId);
    const panel = document.getElementById(panelId);
    const keys = [...counts.keys()].sort((a, b) => counts.get(b) - counts.get(a));
    panel.innerHTML = keys.map(k =>
      `<button type="button" class="fb-chip" data-key="${escapeHtml(k)}">${escapeHtml(k)}<span class="n">${counts.get(k)}</span></button>`
    ).join("");
    panel.querySelectorAll(".fb-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const k = chip.dataset.key;
        if (stateSet.has(k)) stateSet.delete(k); else stateSet.add(k);
        chip.classList.toggle("on", stateSet.has(k));
        updateBtn();
        render();
      });
    });
    function updateBtn() {
      if (stateSet.size) {
        btn.textContent = labelBase + " \u00b7 " + stateSet.size;
        btn.classList.add("active");
      } else {
        btn.textContent = labelBase;
        btn.classList.remove("active");
      }
    }
    btn.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const open = !panel.classList.contains("open");
      popovers.forEach(p => { p.panel.classList.remove("open"); p.btn.setAttribute("aria-expanded", "false"); });
      panel.classList.toggle("open", open);
      btn.setAttribute("aria-expanded", String(open));
    });
    popovers.push({ btn, panel });
  }

  document.addEventListener("click", (ev) => {
    popovers.forEach(p => {
      if (!p.panel.contains(ev.target) && ev.target !== p.btn) {
        p.panel.classList.remove("open");
        p.btn.setAttribute("aria-expanded", "false");
      }
    });
  });

  const tagCounts = new Map();
  EVENTS.forEach(e => (e.tags || []).forEach(t => tagCounts.set(t, (tagCounts.get(t) || 0) + 1)));
  const sourceCounts = new Map();
  EVENTS.forEach(e => sourceCounts.set(e.source, (sourceCounts.get(e.source) || 0) + 1));

  // ---- filtering ----
  // distance: events with unknown (null) distance are never dropped by the cap,
  // and untagged events are never dropped by the tag filter — both matching
  // app/main.py's list_events behavior. Every event has a source, so the
  // source filter is a plain membership test.
  function passesHardFilters(e) {
    if (state.maxMi !== null && e.distance_mi !== null && e.distance_mi > state.maxMi) return false;
    if (state.freeOnly && !e.is_free) return false;
    if (state.tags.size && (e.tags || []).length && !e.tags.some(t => state.tags.has(t))) return false;
    if (state.sources.size && !state.sources.has(e.source)) return false;
    return true;
  }

  function cardHtml(e) {
    const confident = e.booze >= state.thresh;
    const tierClass = confident ? "confident" : (e.booze < 25 ? "maybe low" : "maybe");
    const dim = confident ? "" : "dim";
    const venue = cleanVenue(e.venue_name);
    const read = boozeRead(e.booze);   // tooltip only — no visible label on this view
    // collapsed: time · venue. The coupe fill carries the booze signal;
    // the verbal read was removed from the card as unnecessary noise here.
    const metaShort = [fmtTime(e.starts_at), venue ? escapeHtml(venue) : null]
      .filter(Boolean).join(" &middot; ");
    // expanded: the whole dateline
    const fullParts = [
      fmtTime(e.starts_at),
      e.is_free ? '<span class="free">free</span>' : null,
      (venue || e.neighborhood)
        ? escapeHtml([venue, e.neighborhood ? `(${e.neighborhood})` : null].filter(Boolean).join(" "))
        : null,
      e.host_name ? "by " + escapeHtml(e.host_name) : null,
      e.rsvp_type ? `<span class="rsvp" style="color:var(--gold-dim)">${escapeHtml(e.rsvp_type)}</span>` : null,
      e.distance_mi !== null ? e.distance_mi.toFixed(1) + " mi" : null,
    ].filter(Boolean);
    const metaFull = fullParts.join(" &middot; ");
    const tags = (e.tags || []).map(t => `<span>${escapeHtml(t)}</span>`).join("");
    const blurb = escapeHtml(e.blurb || "");
    const rationale = escapeHtml(e.rationale || "");
    return `<article class="ta-card ${tierClass} enter" data-id="${escapeHtml(e.id)}">
      <div class="ta-top">
        <span class="ta-title"><a href="#">${escapeHtml(e.title)}</a></span>
        <span class="coupe ${dim}" style="--p:${e.booze}" title="${read} (${e.booze}%)">
          <span class="glass"><span class="liq"></span></span><span class="stem"></span><span class="foot"></span>
        </span>
      </div>
      <div class="ta-meta">${metaShort}</div>
      <p class="ta-why" title="${blurb}">${blurb}</p>
      <div class="ta-more"><div class="ta-more-inner">
        <div class="ta-meta-full">${metaFull}</div>
        <div class="ta-pour"><span class="q">why the pour</span>${rationale} <span class="ta-raw">&middot; ${e.booze}% by the numbers</span></div>
      </div></div>
      <div class="ta-foot"><div class="ta-tags">${tags}</div><button class="ta-hold">+ hold</button></div>
      <div class="ta-stamp-row"><span class="q">any booze?</span>
        <button class="ta-stamp" data-stamp>yep</button>
        <button class="ta-stamp miss" data-stamp="miss">nope</button></div>
    </article>`;
  }

  function fadeInNew(scope) {
    requestAnimationFrame(() => {
      scope.querySelectorAll(".ta-card.enter").forEach(c => setTimeout(() => c.classList.remove("enter"), 160));
    });
  }

  // ---- VIRTUALIZATION -------------------------------------------------
  // dayRecords: dayKey -> { shown[], rest[] }. render() emits only the day
  // skeletons (header + empty stacks); a day's SHOWN cards are mounted into
  // its .shown-stack only when the section scrolls near the viewport
  // (IntersectionObserver, 600px margins) and unmounted when it scrolls far
  // away, so DOM size tracks what's near the viewport, not event volume.
  // The below-threshold "less sure" cards stay lazy — built on disclosure open.
  const dayRecords = new Map();
  const root = document.getElementById("real");
  let io = null;

  function mountDay(sec) {
    if (sec.classList.contains("collapsed")) return;
    const stack = sec.querySelector(".shown-stack");
    if (!stack || stack.dataset.mounted) return;
    const rec = dayRecords.get(sec.dataset.day);
    if (!rec) return;
    stack.innerHTML = rec.shown.map(cardHtml).join("");
    stack.dataset.mounted = "1";
    stack.style.minHeight = "";   // size to content once mounted
    fadeInNew(stack);
  }

  function unmountDay(sec) {
    const stack = sec.querySelector(".shown-stack");
    if (!stack || !stack.dataset.mounted) return;
    // freeze the height first so unmounting doesn't jump the scroll position
    stack.style.minHeight = stack.offsetHeight + "px";
    stack.innerHTML = "";
    delete stack.dataset.mounted;
  }

  function render() {
    const byDay = new Map();
    EVENTS.filter(passesHardFilters).forEach(e => {
      const k = dayKey(e.starts_at);
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(e);
    });

    if (io) io.disconnect();
    dayRecords.clear();
    lazyRest.clear();

    const days = [...byDay.keys()].sort();
    if (!days.length) {
      root.innerHTML = `<div class="fb-empty">
        <div class="coupe dim" style="--p:0">
          <span class="glass"><span class="liq"></span></span><span class="stem"></span><span class="foot"></span>
        </div>
        nothing worth pouring above ${state.thresh}% today
        <small>ease up on the pour, the radius, or the guest list above.</small>
      </div>`;
      syncCollapseAll();
      return;
    }

    let html = "";
    days.forEach(k => {
      const dayEvents = byDay.get(k);
      const shown = dayEvents.filter(e => e.booze >= state.thresh);
      const rest = dayEvents.filter(e => e.booze < state.thresh);
      const first = dayEvents[0];
      const n = dayEvents.length;
      dayRecords.set(k, { shown, rest });
      if (rest.length) lazyRest.set(k, rest);
      // days with nothing above the pour auto-collapse (length control)
      const collapsed = shown.length === 0 ? " collapsed" : "";
      const expanded = shown.length === 0 ? "false" : "true";
      const cnt = `<b>${shown.length}</b> shown &middot; ${n} on tap`;
      const moreHtml = rest.length
        ? `<details class="more" data-day="${k}"><summary>${rest.length} more, less sure</summary><div class="stack" data-lazy="1"></div></details>`
        : "";
      html += `<section class="day${collapsed}" data-day="${k}">`
            + `<button type="button" class="dayhead" data-dayhead aria-expanded="${expanded}">`
            + `<span class="chev"></span>`
            + `<span class="dow">${fmtDow(first.starts_at)}</span>`
            + `<span class="date">${fmtDate(first.starts_at)}</span>`
            + `<span class="cnt">${cnt}</span></button>`
            + `<div class="day-body"><div class="stack shown-stack" data-day="${k}"></div>${moreHtml}</div>`
            + `</section>`;
    });
    root.innerHTML = html;

    // observe each day section; mount/unmount its shown cards as it nears/leaves
    io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) mountDay(en.target);
        else unmountDay(en.target);
      });
    }, { rootMargin: "600px 0px 600px 0px" });
    root.querySelectorAll(".day").forEach(sec => io.observe(sec));

    // build a day's "less sure" cards the first time its disclosure opens
    root.querySelectorAll("details.more").forEach(d => {
      d.addEventListener("toggle", () => {
        if (!d.open) return;
        const stack = d.querySelector(".stack[data-lazy]");
        if (!stack) return;
        stack.innerHTML = (lazyRest.get(d.dataset.day) || []).map(cardHtml).join("");
        stack.removeAttribute("data-lazy");
        fadeInNew(stack);
      });
    });
    syncCollapseAll();
  }

  // ---- delegated interactions on #real (survive re-render, lazy + virtual
  //      mounts): day-header collapse, rubber-stamp verdicts, tap-to-expand ----
  root.addEventListener("click", (ev) => {
    const head = ev.target.closest("[data-dayhead]");
    if (head) {
      const sec = head.closest(".day");
      const collapsed = sec.classList.toggle("collapsed");
      head.setAttribute("aria-expanded", String(!collapsed));
      if (collapsed) unmountDay(sec);
      else if (io) { io.unobserve(sec); io.observe(sec); }  // re-eval -> mount if near
      syncCollapseAll();
      return;
    }
    const stamp = ev.target.closest("[data-stamp]");
    if (stamp) {
      const on = stamp.classList.toggle("stamped");
      if (on) stamp.parentElement.querySelectorAll("[data-stamp]").forEach(s => { if (s !== stamp) s.classList.remove("stamped"); });
      return;
    }
    if (ev.target.closest("a, button")) return;   // title link, hold
    const card = ev.target.closest(".ta-card");
    if (card) card.classList.toggle("open");
  });

  // collapse-all control removed; the per-day header chevrons remain the collapse lever.
  function syncCollapseAll() {}

  // ---- filter-bar height -> sticky dayhead offset (survives wrapping) ----
  const fbEl = document.querySelector(".fb");
  function setFbH() {
    document.documentElement.style.setProperty("--fb-h", fbEl.offsetHeight + "px");
  }
  if (typeof ResizeObserver !== "undefined") new ResizeObserver(setFbH).observe(fbEl);
  window.addEventListener("resize", setFbH);
  setFbH();

  // ---- threshold slider (native thumb; --p drives fill + liquid disc) ----
  // The "NN%" readout and the liquid fill track every input pixel, but the
  // expensive re-gate/re-render is DEBOUNCED (140ms trailing) so dragging no
  // longer rebuilds the whole view on every pixel; release also flushes.
  const threshInput = document.getElementById("threshRange");
  const threshRead = document.getElementById("threshRead");
  let threshTimer = null;
  threshInput.addEventListener("input", () => {
    state.thresh = parseInt(threshInput.value, 10);
    threshInput.style.setProperty("--p", state.thresh);
    threshRead.textContent = state.thresh + "%";     // live, cheap
    clearTimeout(threshTimer);
    threshTimer = setTimeout(render, 140);           // re-gate, debounced
  });
  threshInput.addEventListener("change", () => {     // release -> flush now
    clearTimeout(threshTimer);
    render();
  });

  // ---- distance stepper ----
  const distSeg = document.getElementById("distSeg");
  distSeg.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      distSeg.querySelectorAll("button").forEach(b => b.removeAttribute("aria-current"));
      btn.setAttribute("aria-current", "true");
      const mi = btn.dataset.mi;
      state.maxMi = mi === "" ? null : parseFloat(mi);
      render();
    });
  });

  // ---- free toggle ----
  const freeToggle = document.getElementById("freeToggle");
  freeToggle.addEventListener("click", () => {
    state.freeOnly = !state.freeOnly;
    freeToggle.setAttribute("aria-pressed", String(state.freeOnly));
    render();
  });

  // ---- popovers ----
  makeChipPopover("tagsBtn", "tagsPanel", "tags", tagCounts, state.tags);
  makeChipPopover("sourceBtn", "sourcePanel", "source", sourceCounts, state.sources);

  render();
})();
</script>
