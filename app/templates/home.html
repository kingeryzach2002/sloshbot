<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% if warming_up %}<meta http-equiv="refresh" content="12">{% endif %}
<title>sloshbot</title>
{% import "_meter.html" as m %}
{% include "_theme.html" %}
<style>
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }

  .debrief { background: var(--card2); border: 1px solid var(--gold-dim); border-radius: 12px;
             padding: 14px 16px; margin-bottom: 22px; }
  .debrief .q { color: var(--muted); font-size: 13.5px; margin: 8px 0 4px; }
  .debrief .t { font-weight: 650; }
  .debrief .dismiss { float: right; color: var(--faint); font-size: 12px; text-decoration: none; }

  /* the hero is the only place gold is allowed to be loud */
  .hero { background: linear-gradient(160deg, var(--card) 0%, #1a1409 100%);
          border: 1px solid var(--gold-dim); border-radius: 16px;
          padding: 24px 24px 22px; margin-bottom: 26px; position: relative;
          box-shadow: 0 0 48px -12px var(--gold-glow),
                      inset 0 1px 0 rgba(232, 179, 75, 0.08); }
  .hero .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;
                 color: var(--gold); margin-bottom: 10px; }
  .hero .label .pulse { margin-bottom: 3px; }
  .hero .title { font-family: var(--serif); font-weight: 600; font-size: 27px;
                 line-height: 1.2; letter-spacing: 0; }
  .hero .title a { color: var(--text); text-decoration: none; transition: color .15s; }
  .hero .title a:hover { color: var(--gold); }
  .hero .meta { color: var(--cool); font-size: 13.5px; margin-top: 8px; }
  .hero .arc.lg { position: absolute; top: 22px; right: 22px; }
  .hero .why { margin: 14px 0 0; padding: 10px 12px; background: rgba(0, 0, 0, 0.25);
               border-radius: 10px; font-size: 13.5px; color: var(--muted); }
  .hero .why b { color: var(--text); }
  .hero .actions { margin-top: 16px; }

  details.section > summary { cursor: pointer; color: var(--faint); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 10px;
    transition: color .15s; }
  details.section > summary:hover { color: var(--muted); }
  .crow { border-bottom: 1px solid var(--line); }
  .crow > summary { cursor: pointer; list-style: none; display: flex; gap: 10px;
                    align-items: baseline; padding: 8px 2px; font-size: 13.5px;
                    transition: background .15s; }
  .crow > summary:hover { background: var(--card); }
  .crow > summary::-webkit-details-marker { display: none; }
  .crow .n { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crow .w { color: var(--cool); font-size: 12px; white-space: nowrap; }
  .crow .m { width: 34px; text-align: right; }
  .crow .m .arc { width: 16px; height: 16px; display: inline-block; vertical-align: -3px; }
  .crow[open] { background: var(--card); border-radius: 10px; padding: 0 8px 8px; }
  h3.dayhead { font-family: var(--serif); font-style: italic; font-weight: 600;
               font-size: 14px; color: var(--muted); margin: 16px 0 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="wordmark">slosh<span class="tip">bot</span></h1>
    <nav>
      <a href="/" class="active">Tonight</a>
      <a href="/week">This week</a>
      <a href="/calendar">Calendar</a>
      <a href="/map">Map</a>
    </nav>
    <form class="logout-form" method="post" action="/logout">
      <button class="btn" type="submit">log out</button>
    </form>
  </header>

  {% include "_filterbar.html" %}

  <div id="page-main">{% include "_main_home.html" %}</div>
</div>
{% include "_feedback.html" %}
</body>
</html>
