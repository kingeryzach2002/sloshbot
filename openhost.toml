[app]
name = "sloshbot"
version = "0.2.0"
description = "SF event aggregator: scrape, score, shortlist, tentative-hold"

[runtime.container]
image = "Dockerfile"
port = 8000

[routing]
health_check = "/healthz"
# Sloshbot has its own login system (session-cookie auth, see app/auth.py)
# and the owner wants the site link shareable publicly for signup, so the
# ENTIRE app is opened up here rather than relying on OpenHost's own owner
# auth. "/" is a prefix of every route, and public_paths is documented as
# "Route prefixes accessible without authentication" (prefix match), so this
# opens all paths. NOTE: the docs (manifest_spec/routing) only show a
# single-path example (public_paths = ["/tunnel"]) and never explicitly
# demonstrate a whole-app wildcard — "/" is inferred from the documented
# prefix-match semantics, not confirmed by an explicit example. Flag for
# owner/engineer to double check after first deploy that no route is
# unexpectedly still gated.
public_paths = ["/"]

[resources]
memory_mb = 1024
cpu_cores = 1.0

[data]
app_data = true  # sloshbot.db lives in OPENHOST_APP_DATA_DIR (see db.py)
