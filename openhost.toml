[app]
name = "sloshbot"
version = "0.1.0"
description = "SF event aggregator: scrape, score, shortlist, tentative-hold"

[runtime.container]
image = "Dockerfile"
port = 8000

[routing]
health_check = "/week"
# no public_paths: every route stays behind OpenHost's auth

[resources]
memory_mb = 512
cpu_cores = 0.5

[data]
app_data = true  # sloshbot.db lives in OPENHOST_APP_DATA_DIR (see db.py)
